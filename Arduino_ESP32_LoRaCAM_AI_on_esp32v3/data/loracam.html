<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriFuture - Portail</title>
    <link rel="stylesheet" href="chota.min.css">
    <link rel="stylesheet" href="colors.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    
    <nav class="nav">
        <div class="nav-left">
            <a class="brand" href="index.html">
                <img src="agrifuture_logo.png" alt="AgriFuture Logo" style="max-height: 40px;">
            </a>
            <div class="tabs" id="nav-tabs">
                <a href="wifi.html">Paramètres Wifi</a>
                <a href="lora.html">Paramètres LoRa</a>
                <a href="loracam.html" class="active">Paramètres LoRaCam</a>
                <a href="camera.html">Caméra</a>
            </div>
        </div>
    </nav>
    
    <main class="container">
        <h2>LoRaCam settings</h2>
        <form onsubmit="onSubmit(event)">
            <fieldset>
                <p>
                    <label>Quality factor</label>
                    <input type="number" name="quality" min="5" max="100" value="20">
                </p>
                <p>
                    <label>MSS</label>
                    <input type="number" name="mss" min="20" max="240" value="64">
                </p>
                <button type="submit" class="button primary">Save</button>
            </fieldset>
        </form>
    </main>


    <script src="script.js"></script>

    <script>
        const form = document.querySelector('form');

        async function onSubmit(event) {
            event.preventDefault();
            const formData = new FormData(event.target);
            const data = Object.fromEntries(formData.entries());
            try {
                await postHTTP('/api/lora-config/loracam', data);
                alert('LoRaCam settings saved.');
            } catch (error) {
                console.error(error);
                alert('Failed to save LoRaCam settings.');
            }
        }

        async function onLoad() {
            try {
                const data = await getHTTP('/api/lora-config');
                form.quality.value = data.loracam.quality;
                form.mss.value = data.loracam.mss;
            } catch (error) {
                console.error(error);
                alert('Failed to load LoRaCam settings.');
            }
        }
        
        window.addEventListener('load', onLoad);
    </script>


</body>

</html>
