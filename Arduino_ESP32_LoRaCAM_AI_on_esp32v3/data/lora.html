<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriFuture - Portail</title>
    <link rel="stylesheet" href="chota.min.css">
    <link rel="stylesheet" href="colors.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    
    <nav class="nav">
        <div class="nav-left">
            <a class="brand" href="index.html">
                <img src="agrifuture_logo.png" alt="AgriFuture Logo" style="max-height: 40px;">
            </a>
            <div class="tabs" id="nav-tabs">
                <a href="wifi.html">Paramètres Wifi</a>
                <a href="lora.html" class="active">Paramètres LoRa</a>
                <a href="loracam.html">Paramètres LoRaCam</a>
                <a href="camera.html">Caméra</a>
            </div>
        </div>
    </nav>

    <main class="container">
        <h2>Paramètres LoRa</h2>
        <form onsubmit="onSubmit(event)">
            <fieldset>
                <p>
                    <label>BW</label>
                    <select name="bw">
                        <option value="125" selected>125kHz</option>
                        <option value="250">250kHz</option>
                        <option value="500">500kHz</option>
                    </select>
                </p>
                <p>
                    <label>SF</label>
                    <select name="sf">
                        <option value="7">7</option>
                        <option value="8">8</option>
                        <option value="9">9</option>
                        <option value="10">10</option>
                        <option value="11">11</option>
                        <option value="12" selected>12</option>
                    </select>
                </p>
                <p>
                    <label>Fréquence</label>
                    <div class="grouped">
                        <input type="number" step="0.1" name="frequency" value="868.1">
                        <span class="button outline">kHz</span>
                    </div>
                </p>
                <p>
                    <label>Device address</label>
                    <div class="grouped">
                        <input type="text" name="devAddr" value="26012DAA">
                        <span class="button outline">0x</span>
                    </div>
                </p>
                <p>
                    <label>AppSKey</label>
                    <div class="grouped">
                        <input type="text" name="appSKey" value="23158D3BBC31E6AF670D195B5AED5525">
                        <span class="button outline">0x</span>
                    </div>
                </p>
                <p>
                    <label>NwkSKey</label>
                    <div class="grouped">
                        <input type="text" name="nwkSKey" value="23158D3BBC31E6AF670D195B5AED5525">
                        <span class="button outline">0x</span>
                    </div>
                </p>
                <button type="submit" class="button primary">Sauvegarder</button>
            </fieldset>
        </form>
    </main>

    <script src="script.js"></script>
        
    <script>
        const form = document.querySelector('form');
        
        async function onSubmit(event) {
            event.preventDefault();
            const formData = new FormData(event.target);
            const data = Object.fromEntries(formData.entries());
            try {
                await postHTTP('/api/config/lora', data);
                alert('Paramètres LoRa sauvegardés');
            } catch (error) {
                console.error(error);
                alert('Erreur de sauvegarde des paramètres LoRa');
            }
        }

        async function onLoad() {
            try {
                const data = await getHTTP('/api/config');
                form.bw.value = data.bw || '125';
                form.sf.value = data.sf || '12';
                form.frequency.value = data.frequency || '868.1';
                form.devAddr.value = data.devAddr || '26012DAA';
                form.appSKey.value = data.appSKey || '23158D3BBC31E6AF670D195B5AED5525';
                form.nwkSKey.value = data.nwkSKey || '23158D3BBC31E6AF670D195B5AED5525';
            } catch (error) {
                console.error(error);
                alert('Erreur de chargement des paramètres LoRa');
            }
        }

        window.addEventListener('load', onLoad);

    </script>

</body>

</html>
