<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriFuture - Portal</title>
    <link rel="stylesheet" href="chota.min.css">
    <link rel="stylesheet" href="colors.css">
    <link rel="stylesheet" href="style.css">
    <style>
        iframe {
            width: 100%;
            flex-grow: 1;
            border: none;
        }
    </style>
</head>
<body>
    
    <nav class="nav">
        <div class="nav-left">
            <a class="brand" href="index.html">
                <img src="agrifuture_logo.png" alt="AgriFuture Logo" style="max-height: 40px;">
            </a>
            <div class="tabs" id="nav-tabs">
                <a href="wifi.html" class="active">Wi-Fi</a>
                <a href="lora.html">LoRa</a>
                <a href="loracam.html">LoRaCam</a>
                <a href="camera.html">Camera</a>
            </div>
        </div>
    </nav>

    <main class="container">
        <h2>WiFi Settings</h2>
        <form onsubmit="onSubmit(event)">
            <fieldset>
                <p>
                    <label>SSID</label>
                    <input type="text" name="ssid">
                </p>
                <p>
                    <label>Password</label>
                    <input type="text" name="password">
                </p>
                <p>
                    <label id = "ssidVar"></label>
                    <input type="text" name="ip" disabled>
                </p>
                <p>
                    <label>Is the access point active?</label>
                    <input type="checkbox" name="ap">
                </p>
                <button type="submit" class="button primary">Save</button>
            </fieldset>
        </form>
    </main>

    
    <script src="script.js"></script>

    <script>
        const form = document.querySelector('form');
        
        async function onSubmit(event) {
            event.preventDefault();
            const formData = new FormData(event.target);
            const data = Object.fromEntries(formData.entries());
            data.ap = form.ap.checked;
            try {
                alert('WiFi settings saved.');
                await postHTTP('/api/wifi-config', data);
            } catch (error) {
                console.error(error);
                alert('Failed to save Wi-Fi settings.');
            }

        }

        async function onLoad() {
            await loadComponent("head", "/head.html");
            await loadComponent("nav", "/nav.html");
            try {
                const data = await getHTTP('/api/wifi-config');
                form.ssid.value = data.ssid || '';
                form.password.value = data.password || '';
                form.ip.value = data.ip+" :8080" || '';
                form.ap.checked = data.ap;
                document.getElementById("ssidVar").innerHTML = `New Server IP (when connected to: ${data.ssid})`;
            } catch (error) {
                console.error(error);
                alert('Failed to load Wi-Fi settings.');
            }
        }

        window.addEventListener('load', onLoad);
    </script>
    
</body>

</html>
