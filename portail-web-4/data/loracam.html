<h2>Paramètres LoRaCam</h2>
<form id="form-loracam">
    <fieldset>
        <p>
            <label>Quality Factor</label>
            <input type="number" name="quality" min="5" max="100" value="20">
        </p>
        <p>
            <label>MSS</label>
            <input type="number" name="mss" min="20" max="240" value="64">
        </p>
        <button type="submit" class="button primary">Sauvegarder</button>
    </fieldset>
</form>
