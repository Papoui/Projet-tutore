<h2>Paramètres LoRa</h2>
<form api-ref="/api/config/lora" onsubmit="submitPost(event)">
    <fieldset>
        <p>
            <label>BW</label>
            <select name="bw">
                <option value="125" selected>125kHz</option>
                <option value="250">250kHz</option>
                <option value="500">500kHz</option>
            </select>
        </p>
        <p>
            <label>SF</label>
            <select name="sf">
                <option value="7">7</option>
                <option value="8">8</option>
                <option value="9">9</option>
                <option value="10">10</option>
                <option value="11">11</option>
                <option value="12" selected>12</option>
            </select>
        </p>
        <p>
            <label>Fréquence</label>
            <div class="grouped">
                <input type="number" step="0.1" name="frequency" value="868.1">
                <span class="button outline">kHz</span>
            </div>
        </p>
        <p>
            <label>Device address</label>
            <div class="grouped">
                <input type="text" name="devAddr" value="26012DAA">
                <span class="button outline">0x</span>
            </div>
        </p>
        <p>
            <label>AppSKey</label>
            <div class="grouped">
                <input type="text" name="appSKey" value="23158D3BBC31E6AF670D195B5AED5525">
                <span class="button outline">0x</span>
            </div>
        </p>
        <p>
            <label>NwkSKey</label>
            <div class="grouped">
                <input type="text" name="nwkSKey" value="23158D3BBC31E6AF670D195B5AED5525">
                <span class="button outline">0x</span>
            </div>
        </p>
        <button type="submit" class="button primary">Sauvegarder</button>
    </fieldset>
</form>
