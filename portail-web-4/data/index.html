<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriFuture - Portail</title>
    <link rel="stylesheet" href="chota.min.css">
    <link rel="stylesheet" href="colors.css">
    <style>
        body {
            margin: 0;
            height: 100vh;  /* On garde ça en "sécurité" pour les très vieux navigateurs */
            height: 100dvh; /* LA solution magique pour les mobiles récents */
            display: flex;
            flex-direction: column;
            overflow: hidden; 
        }
        
        main {
            flex-grow: 1;
            overflow-y: auto;
            display: flex; 
            flex-direction: column;
        }

        .nav { flex-shrink: 0; }
        .nav-left { flex-wrap: wrap; }
        .tabs { flex-wrap: wrap; }
    </style>
</head>

<body>
    
    <nav class="nav">
        <div class="nav-left">
            <a class="brand" href="#">
                <img src="./agrifuture_logo.png" alt="AgriFuture Logo" style="max-height: 40px;">
            </a>
            <div class="tabs" id="nav-tabs">
                <a href="#" page-name="accueil">Accueil</a>
                <a href="#" page-name="wifi">Paramètres Wifi</a>
                <a href="#" page-name="lora">Paramètres LoRa</a>
                <a href="#" page-name="loracam">Paramètres LoRaCam</a>
                <a href="#" page-name="camera">Caméra</a>
            </div>
        </div>
    </nav>

    <main id="main" class="container">
        <p>Chargement en cours...</p>
    </main>

    <script>
        
        const ip = window.location.hostname;
        const urlCamera = "http://" + ip + ":80";
        
        // Affichage des pages
        const main = document.getElementById('main');
        // Stockage des pages pour une interface plus rapide une fois chargée
        let pages = new Map();
        async function loadPage(pageName) {
            // Exeption pour la page camera
            if (pageName == "camera") {
                main.classList.remove('container');
                main.innerHTML = `<iframe src=${urlCamera} style="flex-grow: 1; border: none;"></iframe>` 
                return;
            }
            // On évite de re fetch
            if (!pages.has(pageName)) {
                try {
                    const html = await fetchHTML(pageName);
                    pages.set(pageName, html);
                } catch (error) {
                    console.error(error);
                    main.innerHTML = "<p class='text-error'>Erreur de chargement.</p>";
                    return;
                }
            }
            main.classList.add('container');
            main.innerHTML = pages.get(pageName);
        } 

        // Fetch un fichier html dans data/*
        async function fetchHTML(fileName) {
            const response = await fetch('/' + fileName + '.html');
            if (!response.ok) throw new Error(`Erreur HTTP ${response.status} : ${await response.text()}`);
            return response.text();
        }

        // Requête POST HTTP pour balise <form> 
        async function submitPost(event) {
            event.preventDefault();
            const ref = event.target.getAttribute('api-ref');
            const formData = new FormData(event.target);
            const data = Object.fromEntries(formData.entries());
            const params = new URLSearchParams(data);
            try {
                const response = await fetch(`${ref}?${params}`, {
                    method: 'POST',
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(data)
                });
                if (!response.ok) throw new Error(`Erreur HTTP ${response.status} : ${await response.text()}`);
            } catch (error) {
                console.error(error);
                alert('Erreur de sauvegarde');
            }
        }

        // Affichage des onglets
        const tabs = document.querySelectorAll('#nav-tabs a');
        function updateTabs(event, tab) {
            event.preventDefault();
            tabs.forEach(tab => tab.classList.remove('active'));
            tab.classList.add('active');
        }
        
        // Au lancement
        window.onload = () => {
            tabs.forEach(tab => {
                tab.onclick = (event) => {
                    updateTabs(event, tab)
                    const pageName = tab.getAttribute('page-name');
                    loadPage(pageName);
                };
            });
            // Affiche le premier onglet
            if (tabs.length > 0) {
                const firstTab = tabs[0];
                firstTab.classList.add('active');
                const pageName = firstTab.getAttribute('page-name')
                loadPage(pageName);
            }
        };
    </script>
</body>

</html>
