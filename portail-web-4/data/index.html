<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriFuture - Portail</title>
    <link rel="stylesheet" href="chota.min.css">
    <link rel="stylesheet" href="colors.css">
</head>

<body>
    <nav class="nav">
        <div class="nav-left">
            <a class="brand" href="#">
                <img src="./agrifuture_logo.png" alt="AgriFuture Logo">
            </a>
            <div class="tabs" id="nav-tabs">
                <a href="#" data-file="accueil">Accueil</a>
                <a href="#" data-file="lora">Paramètres LoRa</a>
                <a href="#" data-file="loracam">Paramètres LoRaCam</a>
            </div>
        </div>
    </nav>

    <main id="main" class="container">
        <p>Chargement en cours...</p>
    </main>

    <script>
        function loadFile(name, tabElement) {
            const allTabs = document.querySelectorAll('#nav-tabs a');
            allTabs.forEach(tab => tab.classList.remove('active'));
            if (tabElement) tabElement.classList.add('active');

            fetch('/' + name + '.html')
                .then(response => {
                    if (!response.ok) throw new Error("Fichier introuvable");
                    return response.text();
                })
                .then(html => {
                    document.getElementById('main').innerHTML = html;
                })
                .catch(error => {
                    document.getElementById('main').innerHTML = "<p class='text-error'>Erreur de chargement.</p>";
                });
        }

        window.onload = function () {
            const tabs = document.querySelectorAll('#nav-tabs a');
            tabs.forEach(tab => {
                tab.addEventListener('click', function (e) {
                    e.preventDefault();
                    const fileName = this.getAttribute('data-file');
                    loadFile(fileName, this);
                });
            });

            if (tabs.length > 0) {
                const firstTab = tabs[0];
                const fileName = firstTab.getAttribute('data-file');
                loadFile(fileName, firstTab);
            }
        };
    </script>

</body>

</html>
